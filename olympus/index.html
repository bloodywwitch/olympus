<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝕺𝐥𝐲𝐦𝐩𝐮𝐬</title>
    <link rel="icon" href="/assets/images/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>𝕺𝐥𝐲𝐦𝐩𝐮𝐬</h1>
    </header>
    <main>
        <section class="card">
            <h2>Calculadora de XP</h2>
            <form onsubmit="event.preventDefault(); calcularNivel();">
                <div class="form-group">
                    <label for="xpTotal">XP Total</label>
                    <input
                        type="number"
                        id="xpTotal"
                        min="0"
                        placeholder="Ex.: 35600"
                        required>
                </div>
                <button type="submit">
                    Calcular
                </button>
            </form>
            <article id="resultado"></article>
        </section>

        <section class="card">
            <h2>Calculadora de Status</h2>
            <form onsubmit="event.preventDefault(); calcularStatus();">
                <div class="form-group">
                    <label for="nivelStatus">Nível</label>
                    <input
                        type="number"
                        id="nivelStatus"
                        min="1"
                        max="200"
                        value="1"
                        required>
                </div>
                <div class="form-group">
                    <label for="deus">Deus</label>
                    <select id="deus" required></select>
                </div>
                <button type="submit">
                    Calcular
                </button>
            </form>
            <article id="resultadoStatus"></article>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
